spring.application.name=nexo-backend

# ── DataSource ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/nexo_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ──────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── JWT ─────────────────────────────────────────────────────
nexo.jwt.secret=CHANGE_ME_USE_A_256BIT_BASE64_SECRET_IN_PRODUCTION
nexo.jwt.expiration-ms=86400000

# ── Mail (SMTP institucional UD) ─────────────────────────────
spring.mail.host=smtp.udistrital.edu.co
spring.mail.port=587
spring.mail.username=no-reply@udistrital.edu.co
spring.mail.password=CHANGE_ME
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Verificación ─────────────────────────────────────────────
nexo.verification.code-ttl-minutes=10
nexo.verification.max-attempts=3

# ── Upload de imágenes (fotos de salón) ──────────────────────
nexo.upload.dir=uploads/photos
