spring.application.name=nexo-backend

# ── Server ──────────────────────────────────────────────────
server.port=${PORT:8080}

# ── DataSource ──────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nexo_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:200600}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ──────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── JWT ─────────────────────────────────────────────────────
nexo.jwt.secret=CHANGE_ME_USE_A_256BIT_BASE64_SECRET_IN_PRODUCTION
nexo.jwt.expiration-ms=86400000

# ── Mail (Gmail SMTP) ────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=nexoud9@gmail.com
spring.mail.password=iytv ieyb wvtu itkv
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Verificación ─────────────────────────────────────────────
nexo.verification.code-ttl-minutes=10
nexo.verification.max-attempts=3

# ── Upload de imágenes (fotos de salón) ──────────────────────
nexo.upload.dir=uploads/photos

# ── CORS ─────────────────────────────────────────────────────
nexo.cors.allowed-origins=http://localhost:5173,https://nexo-ud-front-h88crz4bu-drkgodeaters-projects.vercel.app
