name: Soak Performance Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *' # run once a month

jobs:
  k6-soak:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: nexo_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 200600
          POSTGRES_INITDB_ARGS: "-U postgres"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: Start backend
        run: |
          cd nexo-backend
          chmod +x mvnw
          nohup ./mvnw spring-boot:run \
            -Dspring-boot.run.arguments="--spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/nexo_db --spring.datasource.username=postgres --spring.datasource.password=200600 --spring.jpa.hibernate.ddl-auto=update --spring.flyway.enabled=false" \
            > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for backend
        run: |
          for i in $(seq 1 90); do
            if curl -s -f http://127.0.0.1:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend is ready after ${i}s"
              exit 0
            fi
            if ! kill -0 $(cat /tmp/backend.pid) 2>/dev/null; then
              echo "Backend process died! Logs:"
              cat /tmp/backend.log
              exit 1
            fi
            echo "Waiting for backend... ($i/90)"
            if [ $((i % 20)) -eq 0 ]; then
              echo "=== Recent backend logs ==="
              tail -30 /tmp/backend.log 2>/dev/null || echo "No logs yet"
            fi
            sleep 2
          done
          echo "Backend failed to start after 180s. Full logs:"
          cat /tmp/backend.log
          exit 1

      - name: Create results dir
        run: mkdir -p performance-tests/results

      - name: Run soak scenario
        run: |
          echo "Running soak..."
          k6 run -e BASE_URL=http://127.0.0.1:8080 performance-tests/k6/soak.js --out json=performance-tests/results/soak.json

      - name: Setup Python
        if: always()
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Generate soak report
        if: always()
        run: |
          pip install jinja2
          python3 performance-tests/report/generate_report.py performance-tests/results/soak.json -o performance-tests/results/soak-report -t performance-tests/report/template.html

      - name: Upload soak results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-report
          path: |
            performance-tests/results/soak.json
            performance-tests/results/soak-report

      - name: Print backend logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          cat /tmp/backend.log 2>/dev/null || echo "No logs available"
