name: Soak Performance Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *' # run once a month

jobs:
  k6-soak:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: nexo_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 200600
          POSTGRES_INITDB_ARGS: "-U postgres"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Start backend
        run: |
          cd nexo-backend
          chmod +x mvnw
          ./mvnw spring-boot:run -Dspring-boot.run.arguments="--spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/nexo_db --spring.datasource.username=postgres --spring.datasource.password=200600" > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            if curl -s -f http://127.0.0.1:8080/actuator/health > /dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/60)"
            if [ $((i % 15)) -eq 0 ]; then
              echo "Recent logs:"
              tail -30 /tmp/backend.log 2>/dev/null || echo "No logs yet"
            fi
            sleep 2
          done
          echo "Backend failed to start. Final logs:"
          tail -100 /tmp/backend.log 2>/dev/null || echo "No logs available"
          exit 1

      - name: Create results dir
        run: |
          mkdir -p performance-tests/results
          chmod 777 performance-tests/results

      - name: Run soak scenario
        run: |
          echo "Running soak..."
          docker run --rm -v ${{ github.workspace }}:/work -w /work grafana/k6:latest run performance-tests/k6/soak.js --out json=performance-tests/results/soak.json

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Generate report
        run: |
          python performance-tests/report/generate_report.py performance-tests/results/soak.json -o performance-tests/results/soak-report -t performance-tests/report/template.html || echo "Failed to generate report, maybe template.html is missing"

      - name: Upload reports artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soak-perf-reports
          path: |
            performance-tests/results/*.json
            performance-tests/results/*-report
