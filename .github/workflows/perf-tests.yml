name: Performance Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0' # weekly

jobs:
  k6-baseline:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: nexo_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 200600
          POSTGRES_INITDB_ARGS: "-U postgres"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Start backend
        run: |
          cd nexo-backend
          chmod +x mvnw
          ./mvnw spring-boot:run > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nexo_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: 200600

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            if nc -z localhost 8080; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/60)"
            if [ $((i % 10)) -eq 0 ]; then
              echo "Recent logs:"
              tail -20 /tmp/backend.log 2>/dev/null || echo "No logs yet"
            fi
            sleep 2
          done
          echo "Backend failed to start. Final logs:"
          tail -100 /tmp/backend.log 2>/dev/null || echo "No logs available"
          exit 1

      - name: Create results dir
        run: mkdir -p performance-tests/results
      - name: Run all scenarios and generate reports
        run: |
          chmod +x performance-tests/run_all.sh
          ./performance-tests/run_all.sh

      - name: Setup Python (ensure reports exist)
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Upload reports artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perf-reports
          path: |
            performance-tests/results/*.json
            performance-tests/results/*-report
