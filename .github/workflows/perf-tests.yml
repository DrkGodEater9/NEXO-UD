name: Performance Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'

jobs:
  k6-baseline:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: nexo_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 200600
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y
          k6 version

      - name: Start backend
        run: |
          cd nexo-backend
          chmod +x mvnw
          nohup ./mvnw spring-boot:run \
            -Dspring.datasource.url=jdbc:postgresql://127.0.0.1:5432/nexo_db \
            -Dspring.datasource.username=postgres \
            -Dspring.datasource.password=200600 \
            -Dspring.jpa.hibernate.ddl-auto=update \
            -Dspring.flyway.enabled=false \
            -Dserver.port=8080 \
            > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          echo "Backend PID: $(cat /tmp/backend.pid)"

      - name: Wait for backend
        run: |
          echo "Waiting for backend to start on port 8080..."
          for i in $(seq 1 90); do
            if curl -s -f http://127.0.0.1:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend is ready after $((i*2)) seconds!"
              curl -s http://127.0.0.1:8080/actuator/health
              echo ""
              exit 0
            fi
            if ! kill -0 $(cat /tmp/backend.pid) 2>/dev/null; then
              echo "FATAL: Backend process died!"
              echo "=== Full backend logs ==="
              cat /tmp/backend.log
              exit 1
            fi
            echo "Waiting... ($i/90) - PID $(cat /tmp/backend.pid) is alive"
            if [ $((i % 15)) -eq 0 ]; then
              echo "--- Recent logs ---"
              tail -20 /tmp/backend.log 2>/dev/null || true
              echo "---"
            fi
            sleep 2
          done
          echo "FATAL: Backend did not start in 180 seconds"
          echo "=== Full backend logs ==="
          cat /tmp/backend.log
          exit 1

      - name: Verify backend is reachable
        run: |
          echo "Testing actual endpoints..."
          curl -v http://127.0.0.1:8080/actuator/health || true
          curl -v http://127.0.0.1:8080/api/v1/campus || true
          curl -v http://127.0.0.1:8080/api/v1/schedules || true
          curl -v http://127.0.0.1:8080/api/v1/announcements || true
          echo "Backend PID still alive: $(kill -0 $(cat /tmp/backend.pid) 2>/dev/null && echo YES || echo NO)"

      - name: Run baseline test
        run: |
          mkdir -p performance-tests/results
          echo "Running baseline with BASE_URL=http://127.0.0.1:8080"
          k6 run -e BASE_URL=http://127.0.0.1:8080 \
            performance-tests/k6/baseline.js \
            --out json=performance-tests/results/baseline.json

      - name: Run spike test
        if: success()
        run: |
          echo "Running spike with BASE_URL=http://127.0.0.1:8080"
          k6 run -e BASE_URL=http://127.0.0.1:8080 \
            performance-tests/k6/spike.js \
            --out json=performance-tests/results/spike.json

      - name: Run stress test
        if: success()
        run: |
          echo "Running stress with BASE_URL=http://127.0.0.1:8080"
          k6 run -e BASE_URL=http://127.0.0.1:8080 \
            performance-tests/k6/stress.js \
            --out json=performance-tests/results/stress.json

      - name: Setup Python
        if: always()
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Generate reports
        if: always()
        run: |
          pip install jinja2
          for scenario in baseline spike stress; do
            if [ -f "performance-tests/results/${scenario}.json" ]; then
              python3 performance-tests/report/generate_report.py \
                "performance-tests/results/${scenario}.json" \
                -o "performance-tests/results/${scenario}-report" \
                -t performance-tests/report/template.html || true
            fi
          done

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-reports
          path: |
            performance-tests/results/*.json
            performance-tests/results/*-report

      - name: Print backend logs
        if: always()
        run: |
          echo "=== Full backend logs ==="
          cat /tmp/backend.log 2>/dev/null || echo "No logs available"
